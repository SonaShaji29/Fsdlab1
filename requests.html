```html
<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Report Management</title>

<script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-gray-100">

<!-- Header -->

<header class="bg-blue-700 text-white shadow-lg">

<div class="container mx-auto px-6 py-4 flex justify-between items-center">

<h1 class="text-3xl font-bold">💧 AquaAlert - Reports</h1>

<a href="index.html"
class="bg-white text-blue-700 px-4 py-2 rounded-lg hover:bg-gray-200 font-semibold">

Home

</a>

</div>

</header>

<!-- Title -->

<section class="container mx-auto px-6 py-10">

<h2 class="text-4xl font-bold text-center text-blue-700 mb-8">

Submitted Water Leakage Reports

</h2>

<div class="bg-white rounded-xl shadow-lg overflow-hidden">

<table class="w-full">

<thead class="bg-blue-700 text-white">

<tr>

<th class="p-4">Report ID</th>
<th class="p-4">Name</th>
<th class="p-4">Location</th>
<th class="p-4">Phone</th>
<th class="p-4">Status</th>
<th class="p-4">Action</th>

</tr>

</thead>

<tbody id="reportTableBody">

</tbody>

</table>

</div>

</section>

<script>

let reports = JSON.parse(localStorage.getItem("reports")) || [];

let table = document.getElementById("reportTableBody");

reports.forEach(function(report,index){

table.innerHTML += `

<tr class="border-b text-center hover:bg-gray-100">

<td class="p-4">${report.id}</td>

<td class="p-4">${report.name}</td>

<td class="p-4">${report.location}</td>

<td class="p-4">${report.phone}</td>

<td class="p-4">

<span class="${
report.status=="Completed"
?
'bg-green-100 text-green-700'
:
'bg-yellow-100 text-yellow-700'
} px-3 py-1 rounded-full font-semibold">

${report.status}

</span>

</td>

<td class="p-4">

<button

onclick="markCompleted(${index})"

class="bg-green-600 text-white px-4 py-2 rounded hover:bg-green-800">

Complete

</button>

</td>

</tr>

`;

});

function markCompleted(index){

reports[index].status="Completed";

localStorage.setItem("reports",JSON.stringify(reports));

location.reload();

}

</script>

</body>

</html>
```
