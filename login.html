<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AquaAlert Login</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body{
    background:linear-gradient(135deg,#2563eb,#06b6d4);
}
</style>

</head>

<body class="flex justify-center items-center min-h-screen">

<div class="bg-white p-8 rounded-2xl shadow-2xl w-96">

<h1 class="text-3xl font-bold text-center text-blue-700 mb-2">
💧 AquaAlert
</h1>

<p class="text-center text-gray-500 mb-6">
Water Leakage Reporting System
</p>

<form id="loginForm" class="space-y-4">

<div>
<label class="font-semibold">Username</label>
<input
type="text"
id="username"
placeholder="Enter Username"
class="w-full border rounded-lg p-3 mt-1 focus:outline-none focus:ring-2 focus:ring-blue-500">
</div>

<div>
<label class="font-semibold">Password</label>
<input
type="password"
id="password"
placeholder="Enter Password"
class="w-full border rounded-lg p-3 mt-1 focus:outline-none focus:ring-2 focus:ring-blue-500">
</div>

<div class="flex justify-between items-center">

<label class="flex items-center gap-2">
<input type="checkbox" id="remember">
Remember Me
</label>

<button
type="button"
onclick="togglePassword()"
class="text-blue-600 text-sm">
Show Password
</button>

</div>

<p id="error" class="text-red-600 text-center"></p>

<button
type="submit"
class="w-full bg-blue-700 text-white py-3 rounded-lg hover:bg-blue-900 transition">
Login
</button>

</form>

<div class="text-center mt-5">

<p class="text-gray-500">
Demo Credentials
</p>

<p class="font-semibold text-blue-700">
Username: admin
</p>

<p class="font-semibold text-blue-700">
Password: 1234
</p>

</div>

</div>

<script>

if(localStorage.getItem("loggedIn")=="true"){
    window.location.href="index.html";
}

function togglePassword(){

const pass=document.getElementById("password");

if(pass.type==="password"){
    pass.type="text";
}
else{
    pass.type="password";
}

}

document.getElementById("loginForm").addEventListener("submit",function(e){

e.preventDefault();

const username=document.getElementById("username").value.trim();
const password=document.getElementById("password").value.trim();

if(username==="" || password===""){
    document.getElementById("error").innerHTML="Please fill all fields";
    return;
}

if(username==="admin" && password==="1234"){

sessionStorage.setItem("loggedIn", "true");
sessionStorage.setItem("username",username);

alert("Login Successful");

window.location.href="index.html";

}
else{

document.getElementById("error").innerHTML="Invalid Username or Password";

}

});

</script>

</body>
</html>
