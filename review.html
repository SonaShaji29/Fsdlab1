```html
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AquaAlert Reviews</title>

<script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-gray-100">

<header class="bg-blue-700 text-white py-5 shadow-lg">
<div class="container mx-auto px-6 flex justify-between items-center">

<h1 class="text-3xl font-bold">💧 AquaAlert Reviews</h1>

<a href="index.html"
class="bg-white text-blue-700 px-4 py-2 rounded-lg font-semibold hover:bg-gray-200">
Home
</a>

</div>
</header>

<section class="container mx-auto px-6 py-10">

<h2 class="text-4xl font-bold text-center text-blue-700 mb-8">
Citizen Reviews
</h2>

<div id="reviewContainer" class="space-y-4">

<div class="bg-white p-5 rounded-lg shadow">
<h3 class="font-bold">Anjali</h3>
<p>⭐⭐⭐⭐⭐</p>
<p>Very easy to report water leakages.</p>
</div>

<div class="bg-white p-5 rounded-lg shadow">
<h3 class="font-bold">Rahul</h3>
<p>⭐⭐⭐⭐⭐</p>
<p>Quick response and user-friendly website.</p>
</div>

</div>

<div class="bg-white mt-10 p-6 rounded-lg shadow">

<h2 class="text-2xl font-bold text-blue-700 mb-4">
Give Your Review
</h2>

<input
id="name"
type="text"
placeholder="Your Name"
class="border p-3 rounded w-full mb-4">

<select
id="rating"
class="border p-3 rounded w-full mb-4">

<option>⭐⭐⭐⭐⭐</option>
<option>⭐⭐⭐⭐</option>
<option>⭐⭐⭐</option>
<option>⭐⭐</option>
<option>⭐</option>

</select>

<textarea
id="review"
rows="4"
placeholder="Write your review"
class="border p-3 rounded w-full mb-4"></textarea>

<button
onclick="addReview()"
class="bg-blue-700 text-white px-6 py-3 rounded hover:bg-blue-900">
Submit Review
</button>

</div>

</section>

<script>

window.onload = function(){

const savedReviews =
JSON.parse(localStorage.getItem("reviews")) || [];

savedReviews.forEach(function(item){

displayReview(item.name,item.rating,item.review);

});

}

function addReview(){

const name =
document.getElementById("name").value.trim();

const rating =
document.getElementById("rating").value;

const review =
document.getElementById("review").value.trim();

if(name=="" || review==""){

alert("Please fill all fields");

return;

}

displayReview(name,rating,review);

let reviews =
JSON.parse(localStorage.getItem("reviews")) || [];

reviews.push({

name:name,
rating:rating,
review:review

});

localStorage.setItem("reviews",JSON.stringify(reviews));

alert("Thank you for your review!");

document.getElementById("name").value="";
document.getElementById("review").value="";

}

function displayReview(name,rating,review){

const container =
document.getElementById("reviewContainer");

const card =
document.createElement("div");

card.className =
"bg-white p-5 rounded-lg shadow mt-4";

card.innerHTML =

"<h3 class='font-bold'>"+name+"</h3>"+
"<p>"+rating+"</p>"+
"<p>"+review+"</p>";

container.appendChild(card);

}

</script>

</body>
</html>
```
